name: Update manifest

on:
  push:
    paths:
      - 'videos/**'
      - 'photos/**'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate manifest.json
        run: |
          python3 - <<'PY'
          import json, os

          def list_files(folder, exts):
              if not os.path.isdir(folder):
                  return []
              out = []
              for f in sorted(os.listdir(folder)):
                  if f.startswith('.'):
                      continue
                  if os.path.splitext(f)[1].lower() in exts:
                      out.append(f)
              return out

          videos = list_files('videos', {'.mp4', '.mov', '.webm', '.m4v'})
          photos = list_files('photos', {'.jpg', '.jpeg', '.png', '.webp', '.heic', '.heif'})

          with open('manifest.json', 'w') as f:
              json.dump({'videos': videos, 'photos': photos}, f, indent=2)

          print(f"videos: {len(videos)}, photos: {len(photos)}")
          PY

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git diff --staged --quiet || git commit -m "Auto-update manifest.json"
          git push
