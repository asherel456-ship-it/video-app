<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Video Player</title>
<link rel="manifest" href="app.webmanifest">
<meta name="theme-color" content="#0a0a0c">
<style>
  :root{
    --bg:#0a0a0c;
    --ink:#f4f2ee;
    --dim:rgba(244,242,238,0.6);
    --accent:#ffb020;
    --glass:rgba(10,10,12,0.4);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; height:100%; background:#000;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    overflow:hidden; color:var(--ink);
  }
  #stage{
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:#000;
  }
  #phone{
    position:relative;
    width:100%; height:100%;
    max-width:480px;
    max-height:960px;
    overflow:hidden;
    background:var(--bg);
    box-shadow:0 0 60px rgba(0,0,0,0.6);
  }
  @media (min-width:640px) and (min-height:640px){
    #phone{ border-radius:36px; border:1px solid rgba(255,255,255,0.08); }
  }

  /* Full-screen photo background */
  .bgLayer{
    position:absolute; inset:0;
    background-size:cover; background-position:center;
    filter:brightness(0.9) saturate(1.05);
    transition:opacity 1.4s ease, filter 0.5s ease;
    opacity:0;
  }
  .bgLayer.active{opacity:1;}
  #bgScrim{
    position:absolute; inset:0;
    background:linear-gradient(to bottom, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0) 25%, rgba(0,0,0,0) 70%, rgba(0,0,0,0.55) 100%);
    transition:opacity 0.4s ease;
    pointer-events:none;
  }
  #phone.photoFull #bgScrim{ opacity:0.35; }

  /* Mini phone-frame video player, floats over the photo */
  #miniPhone{
    position:absolute;
    left:50%; top:50%;
    width:66%;
    aspect-ratio: 9 / 19.5;
    transform:translate(-50%,-50%);
    border-radius:32px;
    border:6px solid rgba(4,4,6,0.92);
    box-shadow:0 24px 50px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.06);
    overflow:hidden;
    background:#000;
    z-index:15;
    cursor:pointer;
    transition:left 0.45s cubic-bezier(.22,.9,.32,1),
               top 0.45s cubic-bezier(.22,.9,.32,1),
               width 0.45s cubic-bezier(.22,.9,.32,1),
               height 0.45s cubic-bezier(.22,.9,.32,1),
               border-radius 0.45s cubic-bezier(.22,.9,.32,1),
               border 0.3s ease,
               box-shadow 0.3s ease,
               opacity 0.3s ease,
               transform 0.45s cubic-bezier(.22,.9,.32,1);
  }
  #miniPhone .notch{
    position:absolute; top:8px; left:50%; transform:translateX(-50%);
    width:34%; height:16px; background:rgba(4,4,6,0.95);
    border-radius:10px; z-index:2;
  }
  #miniPhone video{
    width:100%; height:100%; object-fit:cover; display:block;
  }

  #phone.videoFull #miniPhone{
    left:50%; top:50%;
    width:100%; height:100%;
    aspect-ratio:auto;
    border-radius:0; border:none; box-shadow:none;
    transform:translate(-50%,-50%);
  }
  #phone.videoFull #miniPhone video{ object-fit:contain; }
  #phone.videoFull #miniPhone .notch{ opacity:0; }
  #phone.photoFull #miniPhone{
    opacity:0; pointer-events:none;
    transform:translate(-50%,-50%) scale(0.8);
  }

  /* collapse button, shown only in videoFull */
  #collapseBtn{
    position:absolute; top:calc(env(safe-area-inset-top,0px) + 14px); left:16px;
    z-index:26; width:34px; height:34px; border-radius:50%;
    background:var(--glass); backdrop-filter:blur(8px);
    display:none; align-items:center; justify-content:center;
    color:#fff; font-size:18px;
  }
  #phone.videoFull #collapseBtn{ display:flex; }

  /* Top bar (autoplay toggle + counter) - hidden while photoFull */
  #topBar{
    position:absolute; top:0; left:0; right:0;
    display:flex; align-items:center; justify-content:flex-start;
    padding:calc(env(safe-area-inset-top,0px) + 14px) 16px 10px;
    z-index:20;
    transition:opacity 0.3s ease;
  }
  #phone.photoFull #topBar{ opacity:0; pointer-events:none; }
  #counter{
    font-size:13px; letter-spacing:0.02em; color:var(--dim);
    background:var(--glass); backdrop-filter:blur(8px);
    padding:6px 12px; border-radius:20px;
  }
  /* Autoplay toggle sits just below the mini phone-frame */
  #autoBtn{
    position:absolute; left:50%; top:87%;
    transform:translateX(-50%);
    display:flex; align-items:center; gap:7px;
    font-size:13px; font-weight:600; letter-spacing:0.02em;
    background:var(--glass); backdrop-filter:blur(8px);
    color:var(--ink); border:1px solid rgba(255,255,255,0.12);
    padding:8px 16px 8px 12px; border-radius:20px;
    cursor:pointer; user-select:none;
    z-index:20;
    transition:opacity 0.3s ease;
  }
  #phone.videoFull #autoBtn, #phone.photoFull #autoBtn{ opacity:0; pointer-events:none; }
  #autoBtn .dot{
    width:8px; height:8px; border-radius:50%;
    background:rgba(255,255,255,0.3);
    transition:background 0.2s ease, box-shadow 0.2s ease;
  }
  #autoBtn.on .dot{ background:var(--accent); box-shadow:0 0 8px var(--accent); }

  #bottomBar{
    position:absolute; left:0; right:0; bottom:0;
    padding:0 18px calc(env(safe-area-inset-bottom,0px) + 18px);
    z-index:20;
    display:flex; flex-direction:column; gap:10px;
    transition:opacity 0.3s ease;
  }
  #phone.photoFull #bottomBar{ opacity:0; pointer-events:none; }
  #track{ height:3px; width:100%; background:rgba(255,255,255,0.18); border-radius:2px; overflow:hidden; }
  #trackFill{ height:100%; width:0%; background:var(--ink); transition:width 0.1s linear; }
  #hint{ font-size:12.5px; color:var(--dim); text-align:center; letter-spacing:0.02em; }

  #playIcon{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) scale(0.8);
    width:64px; height:64px; z-index:25;
    display:flex; align-items:center; justify-content:center;
    background:rgba(0,0,0,0.4); border-radius:50%;
    opacity:0; transition:opacity 0.25s ease, transform 0.25s ease;
    pointer-events:none;
  }
  #playIcon.show{ opacity:1; transform:translate(-50%,-50%) scale(1); }
  #playIcon svg{ width:26px; height:26px; fill:#fff; }

  #loadWrap{
    position:absolute; inset:0; z-index:30;
    display:flex; align-items:center; justify-content:center;
    background:#0a0a0c; color:var(--dim); font-size:14px;
    flex-direction:column; gap:14px;
  }
  .spinner{
    width:28px; height:28px; border-radius:50%;
    border:2.5px solid rgba(255,255,255,0.2);
    border-top-color:var(--accent);
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
</style>
</head>
<body>

<div id="stage">
  <div id="phone">
    <div id="bg1" class="bgLayer"></div>
    <div id="bg2" class="bgLayer"></div>
    <div id="bgScrim"></div>

    <div id="miniPhone">
      <div class="notch"></div>
      <video id="vid" playsinline webkit-playsinline preload="auto"></video>
      <video id="preloadVid" preload="auto" muted playsinline webkit-playsinline style="display:none"></video>
      <video id="preloadPrevVid" preload="auto" muted playsinline webkit-playsinline style="display:none"></video>
      <div id="playIcon">
        <svg id="playIconSvg" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </div>
    </div>

    <div id="collapseBtn">&#8964;</div>

    <div id="autoBtn"><span class="dot"></span><span id="autoLabel">Autoplay</span></div>

    <div id="topBar">
      <div id="counter">1 / 1</div>
    </div>

    <div id="bottomBar">
      <div id="track"><div id="trackFill"></div></div>
      <div id="hint">Tap photo or video to expand · swipe for next</div>
    </div>

    <div id="loadWrap">
      <div class="spinner"></div>
      <div id="loadText">Loading manifest…</div>
    </div>
  </div>
</div>

<script>
(function(){
  const phoneEl = document.getElementById('phone');
  const els = {
    bg1: document.getElementById('bg1'),
    bg2: document.getElementById('bg2'),
    vid: document.getElementById('vid'),
    preloadVid: document.getElementById('preloadVid'),
    preloadPrevVid: document.getElementById('preloadPrevVid'),
    miniPhone: document.getElementById('miniPhone'),
    collapseBtn: document.getElementById('collapseBtn'),
    counter: document.getElementById('counter'),
    autoBtn: document.getElementById('autoBtn'),
    autoLabel: document.getElementById('autoLabel'),
    playIcon: document.getElementById('playIcon'),
    playIconSvg: document.getElementById('playIconSvg'),
    trackFill: document.getElementById('trackFill'),
    loadWrap: document.getElementById('loadWrap'),
    loadText: document.getElementById('loadText'),
  };

  const ICON_PLAY = '<path d="M8 5v14l11-7z"/>';
  const ICON_PAUSE = '<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>';

  let videos = [];
  let photos = [];
  let vIndex = 0;
  let pIndex = 0;
  let activeBg = 1;
  let autoplay = true;
  let photoTimer = null;
  let view = 'dual'; // 'dual' | 'videoFull' | 'photoFull'
  let wasPlayingBeforePhotoFull = true;

  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
  }

  function setBg(url){
    const showEl = activeBg === 1 ? els.bg2 : els.bg1;
    const hideEl = activeBg === 1 ? els.bg1 : els.bg2;
    showEl.style.backgroundImage = `url("${url}")`;
    void showEl.offsetWidth;
    showEl.classList.add('active');
    hideEl.classList.remove('active');
    activeBg = activeBg === 1 ? 2 : 1;
  }

  function nextPhoto(){
    if(photos.length === 0) return;
    pIndex = (pIndex + 1) % photos.length;
    setBg('photos/' + photos[pIndex]);
  }

  function startPhotoCycle(){
    if(photoTimer) clearInterval(photoTimer);
    if(photos.length === 0) return;
    setBg('photos/' + photos[pIndex]);
    photoTimer = setInterval(nextPhoto, 10000);
  }

  function preloadNeighbors(){
    if(videos.length < 2) return;
    const nextIdx = (vIndex + 1) % videos.length;
    const prevIdx = ((vIndex - 1) + videos.length) % videos.length;
    const nextUrl = 'videos/' + videos[nextIdx];
    const prevUrl = 'videos/' + videos[prevIdx];
    // avoid re-fetching if already warmed for this exact file
    if(els.preloadVid.dataset.url !== nextUrl){
      els.preloadVid.src = nextUrl;
      els.preloadVid.dataset.url = nextUrl;
      els.preloadVid.load();
    }
    if(nextIdx !== prevIdx && els.preloadPrevVid.dataset.url !== prevUrl){
      els.preloadPrevVid.src = prevUrl;
      els.preloadPrevVid.dataset.url = prevUrl;
      els.preloadPrevVid.load();
    }
  }

  function loadVideo(index){
    vIndex = ((index % videos.length) + videos.length) % videos.length;
    els.vid.src = 'videos/' + videos[vIndex];
    els.vid.currentTime = 0;
    els.vid.loop = !autoplay;
    els.vid.play().catch(()=>{});
    els.counter.textContent = (vIndex+1) + ' / ' + videos.length;
    preloadNeighbors();
  }

  function goNext(){ loadVideo(vIndex+1); }
  function goPrev(){ loadVideo(vIndex-1); }

  els.vid.addEventListener('ended', function(){
    if(autoplay){ goNext(); }
  });
  els.vid.addEventListener('timeupdate', function(){
    if(els.vid.duration){
      els.trackFill.style.width = (els.vid.currentTime/els.vid.duration*100) + '%';
    }
  });

  function flashPlayIcon(paused){
    els.playIconSvg.innerHTML = paused ? ICON_PLAY : ICON_PAUSE;
    els.playIcon.classList.add('show');
    setTimeout(()=> els.playIcon.classList.remove('show'), 450);
  }

  function setView(next){
    view = next;
    phoneEl.classList.remove('videoFull','photoFull');
    if(view === 'videoFull') phoneEl.classList.add('videoFull');
    if(view === 'photoFull') phoneEl.classList.add('photoFull');

    if(view === 'photoFull'){
      wasPlayingBeforePhotoFull = !els.vid.paused;
      els.vid.pause();
    } else if(wasPlayingBeforePhotoFull){
      els.vid.play().catch(()=>{});
    }
  }

  // Tap on the mini phone / video area
  els.miniPhone.addEventListener('click', function(e){
    e.stopPropagation();
    if(view === 'dual'){
      setView('videoFull');
    } else if(view === 'videoFull'){
      if(els.vid.paused){ els.vid.play(); flashPlayIcon(true); }
      else { els.vid.pause(); flashPlayIcon(false); }
    }
  });

  // Collapse button (only visible in videoFull)
  els.collapseBtn.addEventListener('click', function(e){
    e.stopPropagation();
    setView('dual');
  });

  // Tap anywhere else on the phone stage = photo interactions
  phoneEl.addEventListener('click', function(e){
    if(view === 'photoFull'){
      setView('dual');
    } else if(view === 'dual'){
      // click landed on background, not on miniPhone (miniPhone stops propagation)
      setView('photoFull');
    }
  });

  els.autoBtn.addEventListener('click', function(e){
    e.stopPropagation();
    autoplay = !autoplay;
    els.autoBtn.classList.toggle('on', autoplay);
    els.autoLabel.textContent = autoplay ? 'Autoplay' : 'Loop';
    els.vid.loop = !autoplay;
  });

  // Swipe handling (vertical) - works in dual and videoFull
  let touchStartY = null;
  phoneEl.addEventListener('touchstart', function(e){
    touchStartY = e.touches[0].clientY;
  }, {passive:true});
  phoneEl.addEventListener('touchend', function(e){
    if(touchStartY === null || view === 'photoFull') return;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if(Math.abs(dy) > 60){
      if(dy < 0) goNext(); else goPrev();
    }
    touchStartY = null;
  }, {passive:true});

  window.addEventListener('keydown', function(e){
    if(view === 'photoFull') return;
    if(e.key === 'ArrowDown' || e.key === 'ArrowRight') goNext();
    if(e.key === 'ArrowUp' || e.key === 'ArrowLeft') goPrev();
    if(e.key === ' '){ e.preventDefault(); els.miniPhone.click(); }
    if(e.key === 'Escape') setView('dual');
  });

  let wheelLock = false;
  window.addEventListener('wheel', function(e){
    if(wheelLock || view === 'photoFull') return;
    if(Math.abs(e.deltaY) < 30) return;
    wheelLock = true;
    if(e.deltaY > 0) goNext(); else goPrev();
    setTimeout(()=> wheelLock = false, 500);
  }, {passive:true});

  fetch('manifest.json?t=' + Date.now())
    .then(r => r.json())
    .then(data => {
      videos = shuffle(data.videos || []);
      photos = shuffle(data.photos || []);
      if(videos.length === 0){
        els.loadText.textContent = 'No videos found — upload some to /videos';
        return;
      }
      if(photos.length === 0){
        els.loadText.textContent = 'No photos found — upload some to /photos';
        // still show video even without photos
      }
      els.loadWrap.style.display = 'none';
      els.autoBtn.classList.add('on');
      loadVideo(0);
      startPhotoCycle();
    })
    .catch(err => {
      els.loadText.textContent = 'Could not load manifest.json';
      console.error(err);
    });

  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }
})();
</script>
</body>
</html>
